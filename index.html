  const defaultState = () => ({
    identity:null,
    view:'welcome',
    currentUnitIndex:0,
    completedUnits:{},
    unitScores:{},
    completedMissions:{},
    missionScores:{},
    examAnswers:{},
    examSubmitted:false,
    finalScore:null,
    startedAt:null,
    finishedAt:null,
    security:{incidents:[], challengeRequired:false, challengeCode:'', challengePassed:0, blockedShortcuts:0},
    camera:{permission:false, preAuthorized:false, active:false, captures:0, lastCaptureAt:null, error:''},
    consent:false,
    fullscreenAccepted:false,
    certificatePhotoDataUrl:'',
    humanEvents:0,
    nonce:Math.random().toString(36).slice(2),
    terminal:false
  });

  let state = loadState();
  let cameraStream = null;
  let cameraTimer = null;
  let countdownTimer = null;
  let currentChallenge = '';

  function loadState(){
    try{
      const raw = localStorage.getItem(STATE_KEY);
      if(!raw) return defaultState();
      const parsed = JSON.parse(raw);
      return Object.assign(defaultState(), parsed, {security:Object.assign(defaultState().security, parsed.security||{}), camera:Object.assign(defaultState().camera, parsed.camera||{})});
    }catch(e){return defaultState();}
  }
  function saveState(){localStorage.setItem(STATE_KEY, JSON.stringify(state));}
  function resetState(){localStorage.removeItem(STATE_KEY); location.reload();}
  function stopCameraStream(){try{if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null;}}catch(e){}}
  function restartProtectedAttempt(reason){
    if(!state.startedAt || state.terminal) return;
    try{recordIncident('fullscreen-exit', reason || 'Salida de pantalla completa.');}catch(e){}
    stopCameraStream();
    sessionStorage.setItem('fortalezaRestartNotice','La sesión protegida fue reiniciada porque se salió de pantalla completa.');
    localStorage.removeItem(STATE_KEY);
    location.reload();
  }
  function esc(s){return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function toast(msg){toastNode.textContent = msg; toastNode.classList.remove('hidden'); clearTimeout(toastNode._t); toastNode._t=setTimeout(()=>toastNode.classList.add('hidden'),3500);}
  function nowIso(){return new Date().toISOString();}
  function formatTime(ms){ms=Math.max(0,ms); const s=Math.floor(ms/1000); const m=Math.floor(s/60); const r=s%60; return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');}
  function elapsedMs(){return state.startedAt ? Date.now() - new Date(state.startedAt).getTime() : 0;}
  function remainingMs(){return TOTAL_MS - elapsedMs();}
  function progressPercent(){
    const totalSteps = units.length + missions.length + 1;
    const doneUnits = Object.keys(state.completedUnits).length;
    const doneMissions = Object.keys(state.completedMissions).length;
    return Math.min(100, Math.round(((doneUnits+doneMissions+(state.examSubmitted?1:0))/totalSteps)*100));
  }
  function allUnitsDone(){return units.every(u=>state.completedUnits[u.id]);}
  function allMissionsDone(){return missions.every(m=>state.completedMissions[m.id]);}
  function moduleScore(){return Object.values(state.unitScores).reduce((a,b)=>a+Number(b||0),0);}
  function missionScore(){return Object.values(state.missionScores).reduce((a,b)=>a+Number(b||0),0);}
  function examScoreRaw(){return examQuestions.reduce((acc,q,i)=>acc + (state.examAnswers[i]===q.a?1:0),0);}
  function securityPenalty(){return Math.min(10, Math.round((state.security.incidents.length*0.6 + state.security.blockedShortcuts*0.3)*10)/10);}
  function finalScore(){
    const unitPart = moduleScore();
    const missionPart = missionScore();
    const examPart = examScoreRaw();
    return Math.max(0, Math.round((unitPart + missionPart + examPart - securityPenalty())*10)/10);
  }

  function shell(inner){
    const time = state.startedAt ? formatTime(remainingMs()) : '--:--';
    return `<div class="toolbar">
      <div class="brand"><div class="brand-icon">FB</div><div><h2>${esc(moduleData.title)}</h2><small>${esc(state.identity?.student_name || 'Sesión no iniciada')}</small></div></div>
      <div class="toolbar-status" aria-label="Estado de la sesión">
        <span>Tiempo <b id="clockMetric">${time}</b></span><span class="sep">·</span>
        <span>Progreso <b id="progressMetric">${progressPercent()}%</b></span>
        <button class="btn ghost small" id="btnFullscreen">Pantalla completa</button>
      </div>
    </div>
    <video id="hiddenCameraVideo" autoplay playsinline muted style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none"></video>
    <div class="workspace">${inner}</div>`;
  }

  function render(){
    saveState();
    if(state.view==='welcome') return renderWelcome();
    if(state.view==='results') return renderResults();
    if(state.security.challengeRequired) return renderChallenge();
    if(state.view==='session') return renderSession();
    if(state.view==='missions') return renderMissions();
    if(state.view==='exam') return renderExam();
    renderWelcome();
  }

  function renderWelcome(){
    app.innerHTML = `<div class="screen">
      <div class="hero-grid">
        <section class="hero glass">
          <div class="top-kicker">Arquitectura del Computador</div>
          <h1>Fortaleza Binaria</h1>

          <div class="quiet-note">Estaciones prácticas · Misiones técnicas · Evaluación final · Certificado</div>
          <div class="station-shell" style="margin-top:18px;min-height:230px">
            <div class="station-title"><h3>Mapa de recorrido</h3><span class="station-caption">U2.1 → U3.3</span></div>
            <div class="protocol-link" style="height:150px;background:linear-gradient(90deg,rgba(255,255,255,.72),rgba(8,166,189,.08),rgba(242,177,52,.10),rgba(238,123,99,.08),rgba(255,255,255,.72))">
              <div class="node">ALU<br><small>Operaciones</small></div><div class="packet"></div><div class="packet two"></div><div class="node">E/S<br><small>Protocolos</small></div>
            </div>
          </div>
        </section>

          <p class="objective">Registre sus datos antes de iniciar. Esta información aparecerá en el certificado final.</p>

          <div class="field"><label>Código o documento</label><input id="studentCode" placeholder="Código estudiantil o identificación" value="${esc(state.identity?.student_code||'')}" /></div>
          <div class="field"><label>Grupo / curso</label><input id="studentGroup" placeholder="Arquitectura del Computador" value="${esc(state.identity?.group||'Arquitectura del Computador')}" /></div>
          <label class="check"><input type="checkbox" id="consent" ${state.consent?'checked':''}> <span>Acepto presentar esta evaluación bajo condiciones de supervisión académica local.</span></label>
          <label class="check"><input type="checkbox" id="understand"> <span>Comprendo que debo permanecer en pantalla completa y desarrollar la actividad sin cambiar de ventana.</span></label>
          <label class="check"><input type="checkbox" id="cameraConsent" ${state.camera?.preAuthorized?'checked':''}> <span>Autorizo activar la cámara antes de ingresar al modo protegido.</span></label>
          <div class="status-note" id="cameraPreflight">La autorización de cámara se solicitará aquí, antes de activar pantalla completa, para evitar interrupciones durante el examen.</div>
          <div class="footer-actions"><button class="btn primary" id="startBtn">Ingresar a la fortaleza</button></div>

        </section>
      </div>
    </div>`;
    document.getElementById('startBtn').addEventListener('click', startSession);
    document.getElementById('cameraConsent').addEventListener('change', e=>preAuthorizeCamera(e.target));
  }
  async function startSession(){
    const name = document.getElementById('studentName').value.trim().replace(/\s+/g,' ');
    const code = document.getElementById('studentCode').value.trim();
    const group = document.getElementById('studentGroup').value.trim() || 'Arquitectura del Computador';
    const consent = document.getElementById('consent').checked;
    const understand = document.getElementById('understand').checked;
    const cameraConsent = document.getElementById('cameraConsent').checked;
    if(name.split(' ').length < 2){toast('Ingrese nombre y apellido completos.'); return;}
    if(!consent || !understand){toast('Debe aceptar el consentimiento y las condiciones de integridad.'); return;}
    if(!cameraConsent && !state.camera.active){toast('Debe autorizar la cámara antes de iniciar.'); return;}
    state.identity = state.identity || {record_id: cryptoRandom(), started_record_at: nowIso()};
    state.identity.student_name = name;
    state.identity.student_code = code;
    state.identity.group = group;
    state.identity.module = moduleData.title;
    state.identity.app_version = APP_VERSION;
    state.consent = true;
    saveState();
    try{
      await ensureCameraReady();
    }catch(e){
      state.camera.error = e && e.message ? e.message : 'No se pudo activar la cámara.';
      state.camera.preAuthorized = false;
      saveState();
      toast('Debe permitir la cámara antes de ingresar al examen.');
      return;
    }
    try{
      await requestFullscreen();
      state.fullscreenAccepted = !!document.fullscreenElement;
    }catch(e){
      state.fullscreenAccepted = false;
      toast('Debe permitir pantalla completa para iniciar.');
      return;
    }
    if(!document.fullscreenElement){
      toast('Active pantalla completa para ingresar al examen.');
      return;
    }
    state.startedAt = state.startedAt || nowIso();
    state.view = 'session';
    state.currentUnitIndex = state.currentUnitIndex || 0;
    saveState();
    scheduleCamera();
    startTimers();
    render();
  }

  async function preAuthorizeCamera(box){
    const status = document.getElementById('cameraPreflight');
    if(!box.checked){state.camera.preAuthorized=false; saveState(); if(status) status.textContent='La cámara debe autorizarse antes de iniciar el examen.'; return;}
    box.disabled = true;
    if(status) status.textContent = 'Solicitando permiso de cámara...';
    try{
      await ensureCameraReady();
      state.camera.preAuthorized = true;
      state.camera.error = '';
      saveState();
      if(status) status.textContent = 'Cámara autorizada. Ahora puede ingresar a la fortaleza y activar pantalla completa.';
      toast('Cámara autorizada correctamente.');
    }catch(e){
      state.camera.preAuthorized = false;
      state.camera.error = e && e.message ? e.message : 'Permiso de cámara no concedido.';
      saveState();
      box.checked = false;
      if(status) status.textContent = 'No fue posible activar la cámara. Debe permitirla para iniciar.';
      toast('No fue posible activar la cámara.');
    }finally{
      box.disabled = false;
    }
  }

  function cryptoRandom(){
    if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'rec-'+Date.now()+'-'+Math.random().toString(36).slice(2);
  }
  async function requestFullscreen(){
    const el = document.documentElement;
    if(!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen();
  }

  async function ensureCameraReady(){
    if(cameraStream && cameraStream.getVideoTracks && cameraStream.getVideoTracks().some(t=>t.readyState==='live')){
      state.camera.permission = true; state.camera.preAuthorized = true; state.camera.active = true; saveState(); attachCameraVideo(); return;
    }
    return startCamera();
  }
  async function startCamera(){
    if(cameraStream && cameraStream.getVideoTracks && cameraStream.getVideoTracks().some(t=>t.readyState==='live')){
      state.camera.permission = true; state.camera.preAuthorized = true; state.camera.active = true; saveState(); attachCameraVideo(); return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('El navegador no expone getUserMedia.');
    cameraStream = await navigator.mediaDevices.getUserMedia({video:{width:{ideal:800},height:{ideal:450}}, audio:false});
    state.camera.permission = true;
    state.camera.preAuthorized = true;
    state.camera.active = true;
    state.camera.error = '';
    saveState();
    setTimeout(()=>attachCameraVideo(),100);
  }
  function attachCameraVideo(){
    const v = document.getElementById('cameraVideo') || document.getElementById('hiddenCameraVideo');
    if(v && cameraStream){ v.srcObject = cameraStream; v.play().catch(()=>{}); }
  }
  function scheduleCamera(){
    clearInterval(cameraTimer);
    cameraTimer = setInterval(()=>captureCamera('periodica'), CAPTURE_INTERVAL_MS);
    setTimeout(()=>captureCamera('inicio'), 1800);
  }
  function openCameraDb(){
    return new Promise((resolve,reject)=>{
      const req = indexedDB.open(DB_NAME,1);
      req.onupgradeneeded = () => req.result.createObjectStore('captures',{keyPath:'id'});
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function saveCapture(entry){
    try{
      const db = await openCameraDb();
      await new Promise((resolve,reject)=>{
        const tx = db.transaction('captures','readwrite');
        tx.objectStore('captures').put(entry);
        tx.oncomplete=resolve; tx.onerror=()=>reject(tx.error);
      });
      db.close();
    }catch(e){recordIncident('camera-store-error','No se pudo guardar captura local: '+e.message);}
  }
  async function captureCamera(reason){
    if(!cameraStream) return;
    const video = document.getElementById('cameraVideo') || document.getElementById('hiddenCameraVideo') || document.createElement('video');
    if(!video.srcObject) video.srcObject = cameraStream;
    const w = 640, h = 360;
    const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
    const ctx = canvas.getContext('2d');
    try{ctx.drawImage(video,0,0,w,h);}catch(e){return;}
    const dataUrl = canvas.toDataURL('image/jpeg',0.58);
    const entry = {id: state.identity.record_id+'-'+Date.now(), record_id:state.identity.record_id, studentName:state.identity.student_name, reason, at:nowIso(), minute:Math.round(elapsedMs()/60000), dataUrl};
    await saveCapture(entry);
    state.camera.captures += 1;
    state.camera.lastCaptureAt = entry.at;
    saveState();
    
    return entry;
  }

  function startTimers(){
    clearInterval(countdownTimer);
    countdownTimer = setInterval(()=>{
      const c=document.getElementById('clockMetric'); if(c) c.textContent=formatTime(remainingMs());
      if(state.startedAt && remainingMs()<=0 && !state.examSubmitted){recordIncident('time-ended','El tiempo máximo del examen terminó.'); submitExam(true);}
    },1000);
  }

  function navigation(active){
    const items = units.map((u,i)=>`<div class="module-pill ${active==='unit'&&i===state.currentUnitIndex?'active':''} ${state.completedUnits[u.id]?'done':''}"><div class="module-dot">${state.completedUnits[u.id]?'✓':u.label.replace('U','')}</div><div><strong>${u.label} · ${esc(u.title)}</strong><small>${esc(u.short)}</small></div></div>`).join('')+
    `<div class="module-pill ${active==='missions'?'active':''} ${allMissionsDone()?'done':''}"><div class="module-dot">M</div><div><strong>Misiones del laboratorio</strong><small>Retos integradores de criterio arquitectónico.</small></div></div>`+
    `<div class="module-pill ${active==='exam'?'active':''} ${state.examSubmitted?'done':''}"><div class="module-dot">F</div><div><strong>Evaluación final</strong><small>50 preguntas con ensamblador de microcontroladores.</small></div></div>`;
    return `<aside class="nav-card glass"><span class="eyebrow">Secuencia obligatoria</span><div class="progress"><i style="width:${progressPercent()}%"></i></div><div class="module-list">${items}</div><div class="quiet-note">Avance guardado automáticamente en este navegador.</div></aside>`;
  }

  function renderUnitVisual(u){

    if(u.type==='fpga') return `<div class="station-shell fpga-fabric"><div class="station-title"><h3>Fabric FPGA: LUT + MUX + routing</h3><span class="station-caption">Hardware reconfigurable</span></div><div class="fabric-row"><div class="block active">Input A/B<br><strong>1 / 0</strong></div><div class="wire"></div><div class="block active purple">LUT XOR<br><strong>Tabla 0110</strong></div><div class="block active">MUX<br><strong>Opcode 1</strong></div><div class="block">Salida Z<br><strong>1</strong></div></div></div>`;
    if(u.type==='bus') return `<div class="station-shell bus-board"><div class="station-title"><h3 style="color:white">Placa base: tráfico procesador–memoria</h3><span class="station-caption" style="color:rgba(255,255,255,.72)">MAR · MBR · READ</span></div><div class="bus-stage"><div class="chip-node"><strong>CPU</strong><br><small>MAR 0x2A<br>MBR espera dato</small></div><div class="bus-stack"><div class="bus-line bus-address active"><span>Dirección</span></div><div class="bus-line bus-data active"><span>Datos</span></div><div class="bus-line bus-control active"><span>Control</span></div></div><div class="chip-node"><strong>RAM</strong><br><small>0x2A → 3C</small></div></div></div>`;
    if(u.type==='io') return `<div class="station-shell"><div class="station-title"><h3>Mapa de Entrada/Salida</h3><span class="station-caption">IOR · IOW · STATUS</span></div><div class="io-stage"><div class="device-card"><div class="device-icon">🧠</div><strong>CPU</strong><p class="small-note">Emite dirección y señal de control.</p></div><div class="device-card"><div class="device-icon">🎛️</div><strong>Controlador E/S</strong><div class="register-grid"><div class="register">STATUS</div><div class="register">CONTROL</div><div class="register">DATA IN</div><div class="register">DATA OUT</div></div></div><div class="device-card"><div class="device-icon">⌨️</div><strong>Periférico</strong><p class="small-note">Teclado o display mapeado.</p></div></div></div>`;

    return `<div class="station-shell"><div class="station-title"><h3>Enlace de comunicación</h3><span class="station-caption">Serial · Full-duplex · UART</span></div><div class="protocol-link"><div class="node">Dispositivo A<br><small>Transmisor/RX</small></div><div class="packet"></div><div class="packet two"></div><div class="node">Dispositivo B<br><small>Transmisor/RX</small></div></div></div>`;
  }
  function renderUnitControls(u, done){
    if(u.type==='alu') return `<div class="lab-controls"><div class="select-card"><label>Entrada A</label><select id="u_a"><option>9</option><option>6</option><option>15</option><option>0</option></select></div><div class="select-card"><label>Entrada B</label><select id="u_b"><option>6</option><option>9</option><option>3</option><option>15</option></select></div><div class="select-card"><label>Operación</label><select id="u_op"><option>XOR</option><option>AND</option><option>OR</option><option>ADD</option><option>SUB</option><option>NOT A</option></select></div></div><p class="status-note">Objetivo: obtener <strong>${u.target.bin}</strong> usando A=${u.target.a}, B=${u.target.b} y operación ${u.target.op}.</p>`;
    if(u.type==='fpga') return `<div class="lab-controls"><div class="select-card"><label>LUT principal</label><select id="u_lut"><option>XOR</option><option>AND</option><option>OR</option><option>NAND</option></select></div><div class="select-card"><label>Opcode activo</label><select id="u_opcode"><option>1</option><option>0</option><option>2</option></select></div><div class="select-card"><label>Bloque selector</label><select id="u_route"><option>MUX</option><option>MAR</option><option>DMA</option><option>STATUS</option></select></div></div>`;
    if(u.type==='bus') return `<div class="lab-controls"><div class="select-card"><label>Operación</label><select id="u_operation"><option>READ</option><option>WRITE</option><option>IRQ</option></select></div><div class="select-card"><label>Dirección MAR</label><select id="u_address"><option>0x2A</option><option>0xA0</option><option>0xB0</option></select></div><div class="select-card"><label>Flujo del dato</label><select id="u_bus"><option>Datos RAM→CPU</option><option>Datos CPU→RAM</option><option>Dirección RAM→CPU</option></select></div></div>`;
    if(u.type==='io') return `<div class="lab-controls"><div class="select-card"><label>Dirección</label><select id="u_address"><option>0xA0</option><option>0x2A</option><option>0xB0</option></select></div><div class="select-card"><label>Señal de control</label><select id="u_signal"><option>IOR</option><option>IOW</option><option>MEMR</option><option>MEMW</option></select></div><div class="select-card"><label>Registro objetivo</label><select id="u_register"><option>DATA IN</option><option>DATA OUT</option><option>MAR</option><option>ALU</option></select></div></div>`;
    if(u.type==='dma') return `<div class="lab-controls"><div class="select-card"><label>Escenario</label><select id="u_scenario"><option>bloque grande disco a RAM</option><option>tecla ocasional</option><option>encender LED simple</option></select></div><div class="select-card"><label>Técnica</label><select id="u_technique"><option>DMA</option><option>Polling</option><option>Interrupción</option></select></div><div class="select-card"><label>Carga de CPU</label><select id="u_cpu"><option>baja</option><option>alta</option><option>constante</option></select></div></div>`;
    return `<div class="lab-controls"><div class="select-card"><label>Modo</label><select id="u_mode"><option>Serial</option><option>Paralelo</option></select></div><div class="select-card"><label>Direccionalidad</label><select id="u_duplex"><option>Full-Duplex</option><option>Half-Duplex</option><option>Simplex</option></select></div><div class="select-card"><label>Protocolo</label><select id="u_protocol"><option>UART</option><option>MAR</option><option>DMA</option><option>ALU</option></select></div></div>`;
  }

  function bindUnit(u){
    bindCommon();
    document.getElementById('btnValidateUnit')?.addEventListener('click',()=>validateUnit(u));
    document.getElementById('btnNextUnit')?.addEventListener('click',()=>{
      if(state.currentUnitIndex < units.length-1){state.currentUnitIndex++; state.view='session';}
      else {state.view='missions';}
      render();
    });
    document.getElementById('btnPrevUnit')?.addEventListener('click',()=>{if(state.currentUnitIndex>0){state.currentUnitIndex--; render();}});
    if(u.type==='alu') drawBits(9,6,15);
  }
  function drawBits(a,b,z){
    const bits = n => n.toString(2).padStart(4,'0').split('').map(x=>`<button class="bit ${x==='1'?'on':''}" disabled>${x}</button>`).join('');
    const A=document.getElementById('bitsA'),B=document.getElementById('bitsB'),Z=document.getElementById('ledZ');
    if(A) A.innerHTML = '<strong>A</strong>'+bits(a);
    if(B) B.innerHTML = '<strong>B</strong>'+bits(b);
    if(Z) Z.innerHTML = z.toString(2).padStart(4,'0').split('').map(x=>`<div class="led ${x==='1'?'on':''}">${x}</div>`).join('');
  }
  function getVal(id){return document.getElementById(id)?.value;}
  function validateUnit(u){
    if(state.completedUnits[u.id]) return;
    let ok=false, partial=0;
    if(u.type==='alu'){ok = getVal('u_a')=='9' && getVal('u_b')=='6' && getVal('u_op')==='XOR'; partial = (getVal('u_a')=='9')+(getVal('u_b')=='6')+(getVal('u_op')==='XOR');}
    if(u.type==='fpga'){ok = getVal('u_lut')==='XOR' && getVal('u_opcode')==='1' && getVal('u_route')==='MUX'; partial = (getVal('u_lut')==='XOR')+(getVal('u_opcode')==='1')+(getVal('u_route')==='MUX');}
    if(u.type==='bus'){ok = getVal('u_operation')==='READ' && getVal('u_address')==='0x2A' && getVal('u_bus')==='Datos RAM→CPU'; partial = (getVal('u_operation')==='READ')+(getVal('u_address')==='0x2A')+(getVal('u_bus')==='Datos RAM→CPU');}
    if(u.type==='io'){ok = getVal('u_address')==='0xA0' && getVal('u_signal')==='IOR' && getVal('u_register')==='DATA IN'; partial = (getVal('u_address')==='0xA0')+(getVal('u_signal')==='IOR')+(getVal('u_register')==='DATA IN');}
    if(u.type==='dma'){ok = getVal('u_scenario')==='bloque grande disco a RAM' && getVal('u_technique')==='DMA' && getVal('u_cpu')==='baja'; partial = (getVal('u_scenario')==='bloque grande disco a RAM')+(getVal('u_technique')==='DMA')+(getVal('u_cpu')==='baja');}
    if(u.type==='protocol'){ok = getVal('u_mode')==='Serial' && getVal('u_duplex')==='Full-Duplex' && getVal('u_protocol')==='UART'; partial = (getVal('u_mode')==='Serial')+(getVal('u_duplex')==='Full-Duplex')+(getVal('u_protocol')==='UART');}
    const score = ok ? u.weight : Math.round((partial/3)*u.weight*10)/10;
    state.completedUnits[u.id] = true;
    state.unitScores[u.id] = score;
    state.humanEvents++;
    saveState();
    toast(ok?'Unidad aprobada con configuración completa.':'Unidad cerrada con puntaje parcial.');
    render();
  }

  function renderMissions(){
    app.innerHTML = shell(`<div class="main-view"><div class="layout">${navigation('missions')}<main class="mission-card glass"><div class="mission-header"><div><span class="badge">Misiones del laboratorio</span><h2 class="module-title">Retos integradores de arquitectura</h2><p class="objective">Cada misión exige elegir una solución técnica. Al responder, se indicará si la decisión fue correcta o incorrecta.</p></div><div class="metric"><span>Puntos</span><strong>${missionScore()}/20</strong></div></div>${missions.map(renderMission).join('')}<div class="footer-actions"><button class="btn gold" id="btnToExam" ${!allMissionsDone()?'disabled':''}>Ir a evaluación final</button></div></main>${sidePanel()}</div></div>`);
    bindCommon(); attachCameraVideo(); startTimers();
    missions.forEach(m=>document.querySelectorAll('input[name="'+m.id+'"]').forEach(x=>x.addEventListener('change',()=>validateMission(m,x.value))));
    document.getElementById('btnToExam')?.addEventListener('click',()=>{state.view='exam'; render();});
  }
  function renderMission(m){
    const done=!!state.completedMissions[m.id]; const score=state.missionScores[m.id]||0; const ok=done && score>0;
    return `<div class="visual"><div class="mission-header" style="margin-bottom:8px"><div><span class="badge">${esc(m.topic)}</span><h3>${esc(m.title)}</h3></div><div class="metric"><span>Puntos</span><strong>${score}/4</strong></div></div><p>${esc(m.prompt)}</p><div class="match-grid">${m.options.map(o=>`<label class="mission-option ${done && o===m.answer?'correct':''} ${done && o!==m.answer && state.completedMissions[m.id] && state.missionSelections?.[m.id]===o?'wrong':''}"><input type="radio" name="${m.id}" value="${esc(o)}" ${done?'disabled':''} ${done&&state.missionSelections?.[m.id]===o?'checked':''}><span>${esc(o)}</span></label>`).join('')}</div>${done?`<p class="status-note ${ok? 'success':'danger'}" style="margin-top:10px"><strong>${ok?'Correcta':'Incorrecta'}.</strong> ${ok?'La decisión técnica fue adecuada.':'La misión quedó cerrada. Respuesta correcta: <strong>'+esc(m.answer)+'</strong>.'}</p>`:''}</div>`;
  }
  function validateMission(m,value){
    if(state.completedMissions[m.id]) return;
    state.missionSelections = state.missionSelections || {};
    state.missionSelections[m.id] = value;
    const ok = value===m.answer;
    state.completedMissions[m.id]=true;
    state.missionScores[m.id]=ok?4:0;
    state.humanEvents++;
    saveState();
    toast(ok?'Respuesta correcta.':'Respuesta incorrecta.');
    renderMissions();
  }
  function renderExam(){
    const submitted = state.examSubmitted;
    const footer = submitted
      ? `<button class="btn success" id="btnBackResults">Volver al resultado y certificado</button>`
      : `<button class="btn primary" id="btnSubmitExam">Finalizar y calcular resultado</button>`;
    app.innerHTML = shell(`<div class="main-view"><main class="final-card glass"><div class="mission-header"><div><span class="badge">Evaluación final</span><h2 class="module-title">Prueba conceptual y ensamblador de microcontroladores</h2><p class="objective">Seleccione una respuesta por pregunta. Al responder la primera pregunta se registrará una fotografía para el certificado final.</p></div><div class="metric"><span>Respondidas</span><strong id="answeredMetric">${Object.keys(state.examAnswers).length}/${examQuestions.length}</strong></div></div><div id="examList">${examQuestions.map(renderQuestion).join('')}</div><div class="footer-actions">${footer}</div></main></div>`);
    bindCommon(); startTimers();
    document.querySelectorAll('input[data-q]').forEach(x=>x.addEventListener('change',()=>handleExamAnswer(x)));
    document.getElementById('btnSubmitExam')?.addEventListener('click',()=>submitExam(false));
    document.getElementById('btnBackResults')?.addEventListener('click',()=>{state.view='results'; render();});
  }
  function renderQuestion(q,i){
    const answered = state.examAnswers[i];
    const submitted = state.examSubmitted;
    const resolved = !!answered || submitted;
    const isCorrect = answered === q.a;
    const status = answered ? (isCorrect ? 'Correcta' : 'Incorrecta') : 'Pendiente';
    const options = shuffleFixed(q.o, i);
    return `<section class="question ${answered?'answered':''} ${resolved && answered ? (isCorrect?'correct':'incorrect') : ''}" data-question="${i}"><div class="question-head"><h4>${i+1}. ${esc(q.q)}</h4><span class="q-status">${status}</span></div><div class="options revealed">${options.map(o=>`<label class="option ${answered===o?'selected':''} ${resolved && o===q.a?'is-correct':''} ${resolved && answered===o && o!==q.a?'is-wrong':''}"><input type="radio" data-q="${i}" name="q${i}" value="${esc(o)}" ${answered===o?'checked':''} ${answered||submitted?'disabled':''}><span>${esc(o)}</span></label>`).join('')}</div>${resolved && answered?`<div class="q-feedback ${isCorrect?'ok':'bad'}"><strong>${isCorrect?'Correcta':'Incorrecta'}.</strong> ${isCorrect?'La opción seleccionada coincide con el criterio esperado.':'Respuesta correcta: <strong>'+esc(q.a)+'</strong>.'}</div>`:''}</section>`;
  }
  function handleExamAnswer(input){
    const idx = Number(input.dataset.q);
    if(state.examSubmitted || state.examAnswers[idx]) return;
    const wasFirstAnswer = Object.keys(state.examAnswers).length === 0;
    state.examAnswers[idx] = input.value;
    state.humanEvents++;
    saveState();
    if(wasFirstAnswer && !state.certificatePhotoDataUrl){
      captureCamera('primera-pregunta-certificado').then(entry=>{
        if(entry && entry.dataUrl){
          state.certificatePhotoDataUrl = entry.dataUrl;
          saveState();
        }
      }).catch(e=>{
        state.camera.error = e && e.message ? e.message : 'No se pudo registrar fotografía para certificado.';
        saveState();
      });
    }
    const section = input.closest('.question');
    if(section){
      section.outerHTML = renderQuestion(examQuestions[idx], idx);
    }
    const metric = document.getElementById('answeredMetric');
    if(metric) metric.textContent = Object.keys(state.examAnswers).length + '/' + examQuestions.length;
  }
  function shuffleFixed(arr,seed){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){const j=(seed*7+i*3)%a.length; [a[i],a[j]]=[a[j],a[i]];}
    return a;
  }
  async function submitExam(forced){
    if(state.examSubmitted && state.view==='results') return;
    const unanswered = examQuestions.length - Object.keys(state.examAnswers).length;
    if(unanswered>0 && !forced){ if(!confirm('Faltan '+unanswered+' preguntas por responder. ¿Desea finalizar?')) return; }
    try{
      await Promise.race([
        captureCamera('cierre'),
        new Promise(resolve=>setTimeout(resolve, 1400))
      ]);
    }catch(e){
      state.camera.error = e && e.message ? e.message : 'No se pudo registrar la captura final.';
    }
    state.examSubmitted=true;
    state.finishedAt=nowIso();
    state.finalScore=finalScore();
    state.terminal=true;
    state.security.challengeRequired=false;
    state.security.challengeCode='';
    state.view='results';
    saveState();
    renderResults();
  }

  function renderResults(){
    const score = state.finalScore ?? finalScore();
    const passed = score >= PASSING_SCORE;
    const deg = Math.min(360, Math.max(0, score*3.6));
    app.innerHTML = shell(`<div class="main-view"><main class="results-card glass" style="max-width:1120px;margin:0 auto"><div class="mission-header"><div><span class="badge">Resultado final</span><h2 class="module-title">Dictamen arquitectónico</h2><p class="objective">La calificación integra estaciones prácticas, misiones y evaluación final.</p></div></div><div class="grid-2"><div><div class="result-ring" style="--score-deg:${deg}deg"><div class="result-ring-inner"><div><strong>${score}</strong><br><span>/100</span></div></div></div><p class="status-note ${passed?'success':'danger'}" style="text-align:center;margin-top:16px"><strong>${passed?'Aprobado':'No aprobado'}</strong> · Umbral ${PASSING_SCORE}/100</p></div><div class="visual"><h3>Resumen académico</h3><div class="grid-2"><div class="card-mini"><strong>${moduleScore()}</strong><br><small>Estaciones /30</small></div><div class="card-mini"><strong>${missionScore()}</strong><br><small>Misiones /20</small></div><div class="card-mini"><strong>${examScoreRaw()}</strong><br><small>Evaluación /50</small></div><div class="card-mini"><strong>${Object.keys(state.examAnswers).length}</strong><br><small>Preguntas respondidas</small></div></div><p class="status-note" style="margin-top:12px"><strong>Estudiante:</strong> ${esc(state.identity.student_name)}<br><strong>Grupo:</strong> ${esc(state.identity.group||'Arquitectura del Computador')}<br><strong>Fecha:</strong> ${new Date(state.finishedAt||nowIso()).toLocaleString()}</p></div></div><div class="certificate-preview" style="margin-top:18px"><span class="eyebrow">Certificado descargable</span><h2>Fortaleza Binaria</h2><p>Se certifica que <strong>${esc(state.identity.student_name)}</strong> presentó la evaluación autogestionada de Arquitectura del Computador en las unidades U2.1 a U3.3, con calificación final de <strong>${score}/100</strong>.</p></div><div class="footer-actions"><button class="btn success" id="btnCertificate">Descargar certificado HTML</button><button class="btn ghost" id="btnReview">Revisar respuestas</button><button class="btn danger" id="btnReset">Reiniciar intento local</button></div></main></div>`);
    bindCommon(); startTimers();
    document.getElementById('btnCertificate').addEventListener('click',downloadCertificate);
    document.getElementById('btnReview').addEventListener('click',()=>{state.view='exam'; render();});
    document.getElementById('btnReset').addEventListener('click',()=>{if(confirm('Esto borrará el progreso local de este navegador. ¿Continuar?')) resetState();});
  }
  function renderChallenge(){
    currentChallenge = state.security.challengeCode || String(Math.floor(100000+Math.random()*900000));
    state.security.challengeCode = currentChallenge; saveState();
    app.innerHTML = `<div class="overlay"><div class="modal glass"><span class="eyebrow">Verificación humana</span><h2 style="font-size:34px;margin:12px 0">Sesión protegida</h2><p>Se detectaron incidentes de integridad. Para continuar, escriba el código mostrado.</p><div class="visual" style="text-align:center;font-size:42px;font-weight:bold;letter-spacing:.16em;color:var(--ink)">${currentChallenge}</div><div class="field"><label>Código de verificación</label><input id="challengeInput" inputmode="numeric" /></div><div class="footer-actions"><button class="btn primary" id="btnChallenge">Validar y continuar</button></div></div></div>`;
    document.getElementById('btnChallenge').addEventListener('click',()=>{
      if(document.getElementById('challengeInput').value.trim()===currentChallenge){state.security.challengeRequired=false; state.security.challengeCode=''; state.security.challengePassed++; state.humanEvents++; saveState(); render();}
      else toast('Código incorrecto.');
    });
  }

  function bindCommon(){
    attachCameraVideo();
    document.getElementById('btnFullscreen')?.addEventListener('click',()=>requestFullscreen());
    document.getElementById('btnCapture')?.addEventListener('click',()=>captureCamera('manual'));
    document.getElementById('btnActa')?.addEventListener('click',downloadActa);
  }
  function recordIncident(type, detail){
    if(!state.startedAt || state.terminal) return;
    state.security.incidents.push({type, detail, at:nowIso(), view:state.view});
    if(state.security.incidents.length>0 && state.security.incidents.length % 4 === 0){state.security.challengeRequired=true;}
    saveState();
  }
  document.addEventListener('visibilitychange',()=>{if(document.hidden) recordIncident('visibilitychange','Cambio de pestaña o ventana.');});
  window.addEventListener('blur',()=>recordIncident('blur','Pérdida de foco de la ventana.'));
  document.addEventListener('fullscreenchange',()=>{if(state.startedAt && !state.terminal && !document.fullscreenElement){setTimeout(()=>restartProtectedAttempt('Salida de pantalla completa.'),160);}});
  document.addEventListener('contextmenu',e=>{if(state.startedAt){e.preventDefault(); state.security.blockedShortcuts++; recordIncident('contextmenu','Menú contextual bloqueado.');}});
  document.addEventListener('copy',e=>{if(state.startedAt){e.preventDefault(); state.security.blockedShortcuts++; recordIncident('copy','Copia bloqueada.');}});
  document.addEventListener('paste',e=>{if(state.startedAt){e.preventDefault(); state.security.blockedShortcuts++; recordIncident('paste','Pegado bloqueado.');}});
  document.addEventListener('keydown',e=>{
    const blocked = e.key==='F12' || (e.ctrlKey && ['s','p','u','c','v','x','a'].includes(e.key.toLowerCase())) || (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()));
    if(blocked && state.startedAt){e.preventDefault(); state.security.blockedShortcuts++; recordIncident('shortcut','Atajo bloqueado: '+(e.ctrlKey?'Ctrl+':'')+(e.shiftKey?'Shift+':'')+e.key);}
  });
  document.addEventListener('pointerdown',()=>{if(state.startedAt){state.humanEvents++; if(state.humanEvents%12===0) saveState();}});

  function download(filename, text, type){
    const blob = new Blob([text],{type:type||'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),800);
  }
  function acta(){
    return {app_version:APP_VERSION, module:moduleData, identity:state.identity, startedAt:state.startedAt, finishedAt:state.finishedAt, completedUnits:state.completedUnits, unitScores:state.unitScores, completedMissions:state.completedMissions, missionScores:state.missionScores, examCorrect:examScoreRaw(), examAnswers:state.examAnswers, finalScore:state.finalScore ?? finalScore(), security:state.security, camera:state.camera, certificatePhotoDataUrl:state.certificatePhotoDataUrl, generatedAt:nowIso(), integrityHash:simpleHash(JSON.stringify({id:state.identity, score:state.finalScore, sec:state.security.incidents.length}))};
  }
  function downloadActa(){download('acta_fortaleza_binaria_'+safeName(state.identity?.student_name||'estudiante')+'.json', JSON.stringify(acta(),null,2), 'application/json;charset=utf-8');}
  function downloadCertificate(){
    const a=acta(); const passed=(a.finalScore>=PASSING_SCORE);
    const photoHtml = a.certificatePhotoDataUrl ? `<img class="photo" src="${esc(a.certificatePhotoDataUrl)}" alt="Fotografía del estudiante">` : `<div class="photo photo-empty">Sin fotografía</div>`;
    const cert = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Certificado Fortaleza Binaria</title><style>body{font-family:'Times New Roman',serif;background:#f6f3ee;color:#243746;padding:30px}.cert{max-width:980px;margin:auto;background:#fffdf8;border:10px double #0c9fb2;border-radius:24px;padding:54px;text-align:center;position:relative}h1{font-size:54px;margin:8px 0;color:#172533}h2{font-size:30px;color:#0b7180}.name{font-size:34px;font-weight:bold;margin:22px 0}.score{font-size:42px;font-weight:bold;color:${passed?'#2b8f67':'#c85a4f'}}.photo{position:absolute;right:36px;top:36px;width:118px;height:92px;object-fit:cover;border:4px solid #fff;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.18);background:#eef4f5}.photo-empty{display:grid;place-items:center;font-size:12px;color:#5d6b76;border:2px dashed #9bb5be}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}.box{border:1px solid #d9e2e7;border-radius:14px;padding:12px;background:white}.small{font-size:13px;color:#5d6b76}.sig{margin-top:44px;display:flex;justify-content:space-around}.line{border-top:1px solid #243746;width:260px;padding-top:8px}@media print{body{background:white}.cert{border-color:#243746}}</style></head><body><section class="cert">${photoHtml}<div class="small">Universidad de La Guajira · Arquitectura del Computador</div><h1>Fortaleza Binaria</h1><h2>Certificado de presentación de evaluación autogestionada</h2><p>Se certifica que</p><div class="name">${esc(a.identity.student_name)}</div><p>presentó el examen virtual Offline First sobre ALU, FPGA, buses, entrada/salida, DMA, protocolos y fundamentos de ensamblador para microcontroladores.</p><div class="score">${a.finalScore}/100 · ${passed?'APROBADO':'NO APROBADO'}</div><div class="grid"><div class="box"><strong>${a.unitScores?Object.values(a.unitScores).reduce((x,y)=>x+Number(y||0),0):0}/30</strong><br><span class="small">Laboratorios</span></div><div class="box"><strong>${a.missionScores?Object.values(a.missionScores).reduce((x,y)=>x+Number(y||0),0):0}/20</strong><br><span class="small">Misiones</span></div><div class="box"><strong>${a.examCorrect*2}/50</strong><br><span class="small">Evaluación final</span></div></div><p class="small">Registro: ${esc(a.identity.record_id)} · Generado: ${new Date(a.generatedAt).toLocaleString()} · Incidentes: ${a.security.incidents.length} · Capturas locales: ${a.camera.captures}</p><p class="small">Hash de verificación local: ${a.integrityHash}</p><div class="sig"><div class="line">${esc(moduleData.author)}<br><span class="small">Autoría y diseño pedagógico</span></div><div class="line">Evidencia local del navegador<br><span class="small">Acta JSON descargable</span></div></div><script>window.onload=()=>setTimeout(()=>window.print(),600);<\/script></section></body></html>`;
    download('certificado_fortaleza_binaria_'+safeName(a.identity.student_name)+'.html', cert, 'text/html;charset=utf-8');
  }
  function safeName(s){return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60)||'estudiante';}
  function simpleHash(str){let h=2166136261; for(let i=0;i<str.length;i++){h^=str.charCodeAt(i); h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);} return ('00000000'+(h>>>0).toString(16)).slice(-8).toUpperCase();}

  window.addEventListener('online',()=>toast('Conexión detectada. El examen sigue operando localmente.'));
  window.addEventListener('offline',()=>toast('Sin conexión. El examen continúa en modo offline.'));
  render();
  const restartNotice = sessionStorage.getItem('fortalezaRestartNotice');
  if(restartNotice){sessionStorage.removeItem('fortalezaRestartNotice'); setTimeout(()=>toast(restartNotice),500);}
})();
  </script>
</body>
</html>
